<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡股息筆記 v30</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --bg: #f8f9fa; --text: #2d3436; --accent: #27ae60;
            --gray: #e9ecef; --sidebar-w: 300px; --danger: #d63031; --monthly: #0984e3; --edit-bg: #fffcf0;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, "Noto Sans TC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; }

        /* 側邊欄與遮罩 */
        #sidebar { position: fixed; left: calc(-1 * var(--sidebar-w)); top: 0; width: var(--sidebar-w); height: 100%; background: white; box-shadow: 2px 0 20px rgba(0,0,0,0.15); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; overflow-y: auto; padding: 25px; }
        #sidebar.open { left: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 999; backdrop-filter: blur(3px); }
        
        /* 導覽樣式 */
        .search-box { width: 100%; border: 1.5px solid var(--gray); padding: 12px 15px; border-radius: 12px; font-size: 1rem; margin-bottom: 20px; transition: border-color 0.2s; }
        .search-box:focus { border-color: var(--monthly); }
        .nav-group { margin-bottom: 20px; }
        .nav-title { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #adb5bd; font-weight: 800; padding: 10px 0; letter-spacing: 1px; cursor: pointer; }
        .nav-item { padding: 12px 15px; border-radius: 12px; cursor: pointer; font-size: 1rem; margin-bottom: 4px; transition: 0.2s; color: #495057; }
        .nav-item:hover { background: var(--gray); }
        .nav-item.active { background: var(--text); color: white; font-weight: 600; }

        /* 頂部標題列 */
        header { display: flex; align-items: center; padding: 0 20px; height: 65px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--gray); position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 1.5rem; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .view-title { font-weight: 800; flex: 1; text-align: center; font-size: 1.1rem; }

        /* 主畫面內容 */
        .container { padding: 20px; max-width: 550px; margin: 0 auto; }
        .summary-box { background: var(--text); color: white; padding: 35px 20px; border-radius: 30px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .summary-label { font-size: 0.85rem; opacity: 0.7; font-weight: 600; margin-bottom: 10px; }
        .total-val { font-size: 2.8rem; font-weight: 900; margin: 5px 0; letter-spacing: -1.5px; }
        .avg-info { font-size: 1.05rem; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.15); font-weight: 600; color: #dcdde1; }

        /* 圖表卡片 */
        .chart-card { background: white; padding: 25px; border-radius: 25px; border: 1px solid var(--gray); margin-bottom: 25px; box-shadow: var(--shadow); }

        /* 輸入表單卡片 */
        .card { background: white; padding: 25px; border-radius: 25px; border: 1px solid var(--gray); margin-bottom: 25px; box-shadow: var(--shadow); }
        .card.editing { border: 2px solid #f1c40f; background-color: var(--edit-bg); }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.8rem; color: #868e96; margin-bottom: 8px; font-weight: 700; }
        input, select { width: 100%; border: 1.5px solid var(--gray); padding: 14px; border-radius: 14px; font-size: 1rem; color: var(--text); transition: 0.2s; -webkit-appearance: none; }
        input:focus, select:focus { border-color: var(--accent); background: #fff; }
        .btn-add { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3); }

        /* 列表樣式 */
        .list-header { font-size: 0.9rem; font-weight: 800; color: #868e96; margin: 30px 0 15px 5px; display: flex; justify-content: space-between; }
        .item { display: flex; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--gray); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .item-content { flex: 1; cursor: pointer; }
        .item-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 4px; display: flex; align-items: center; }
        .item-sub { font-size: 0.85rem; color: #adb5bd; font-weight: 500; }
        .item-price-group { text-align: right; margin-right: 15px; }
        .item-price { color: var(--accent); font-weight: 900; font-size: 1.25rem; }
        .item-monthly { color: var(--monthly); font-size: 0.85rem; font-weight: 800; margin-top: 3px; }
        
        .rank-badge { background: #f1f2f6; color: #57606f; padding: 3px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; margin-right: 10px; }
        .action-btn { border: none; background: #fff0f0; padding: 12px; border-radius: 12px; color: var(--danger); font-weight: 800; cursor: pointer; transition: 0.2s; }
        .action-btn:active { transform: scale(0.9); }

        .empty-state { text-align: center; padding: 60px 20px; color: #adb5bd; font-weight: 600; }
        .hide { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>
    
    <div id="sidebar">
        <input type="text" id="navSearch" class="search-box" placeholder="搜尋股票或年份..." oninput="renderNav()">
        
        <div class="nav-item active" id="nav-all" onclick="filterBy('all')">📍 所有紀錄</div>
        
        <div class="nav-group">
            <div class="nav-title" onclick="toggleNavGroup('stock-list')">股票標的 ▾</div>
            <div id="stock-list" class="nav-list"></div>
        </div>

        <div class="nav-group">
            <div class="nav-title" onclick="toggleNavGroup('year-list')">年度統計 ▾</div>
            <div id="year-list" class="nav-list"></div>
        </div>

        <div style="margin-top:40px; border-top: 1px solid var(--gray); padding-top: 20px;">
            <p style="font-size:0.75rem; color:#adb5bd; font-weight:800; margin-bottom:15px">資料管理</p>
            <button style="width:100%; padding:14px; border-radius:12px; border:1px solid #dee2e6; background:#fff; margin-bottom:10px; font-weight:600; cursor:pointer" onclick="exportCSV()">💾 匯出 CSV 備份</button>
            <button style="width:100%; padding:14px; border-radius:12px; border:1px solid #dee2e6; background:#fff; margin-bottom:20px; font-weight:600; cursor:pointer" onclick="document.getElementById('fileInput').click()">📤 匯入 CSV 備份</button>
            <input type="file" id="fileInput" class="hide" accept=".csv" onchange="importCSV(this)">
            
            <button style="width:100%; padding:14px; border-radius:12px; border:1.5px solid #ffcfcf; background:#fff; color:var(--danger); font-weight:800; cursor:pointer" onclick="forceReset()">🔄 數據清空重整</button>
        </div>
    </div>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="view-title" id="currentViewTitle">所有紀錄</div>
        <div style="width:40px"></div> </header>

    <div class="container">
        <div class="summary-box">
            <div class="summary-label" id="sumLabel">總累計股息</div>
            <div class="total-val" id="totalDisplay">$ 0</div>
            <div id="avgDisplay" class="avg-info hide"></div>
        </div>

        <div class="chart-card" id="chartCard">
            <canvas id="myChart"></canvas>
        </div>

        <div class="card" id="inputCard">
            <div id="editModeLabel" class="hide" style="color:#f39c12; font-size:0.85rem; font-weight:900; margin-bottom:15px; text-align:center">正在編輯單筆紀錄...</div>
            
            <div class="input-group">
                <label>股票名稱</label>
                <select id="stockSelect" onchange="checkNewStock(this)">
                    <option value="">請選擇或新增...</option>
                    <option value="NEW_STOCK" style="color:var(--monthly)">+ 新增自定義標的</option>
                </select>
            </div>

            <div style="display:flex; gap:12px">
                <div class="input-group" style="flex:1">
                    <label>配息頻率</label>
                    <select id="freqSelect" onchange="checkNewFreq(this)">
                        <option value="12">年配</option>
                        <option value="6">半年配</option>
                        <option value="3">季配</option>
                        <option value="1">月配</option>
                        <option value="NEW_FREQ">+ 自定義</option>
                    </select>
                </div>
                <div class="input-group" style="flex:1.5">
                    <label>領取日期</label>
                    <input type="date" id="inputDate">
                </div>
            </div>

            <div style="display:flex; gap:12px">
                <div class="input-group" style="flex:1">
                    <label>每股股息</label>
                    <input type="number" id="inputPer" step="0.001" placeholder="0.00" inputmode="decimal">
                </div>
                <div class="input-group" style="flex:1">
                    <label>持有股數</label>
                    <input type="number" id="inputShares" placeholder="0" inputmode="numeric">
                </div>
            </div>

            <input type="hidden" id="editId">
            <button class="btn-add" id="submitBtn" onclick="saveRecord()">存入股息紀錄</button>
            <button id="cancelBtn" class="hide" style="width:100%; background:none; border:none; color:#adb5bd; margin-top:15px; font-weight:700" onclick="cancelEdit()">放棄修改</button>
        </div>

        <div class="list-header" id="listHeader">最近紀錄</div>
        <div id="mainList"></div>
    </div>

<script>
    Chart.register(ChartDataLabels);
    
    let db = {
        records: JSON.parse(localStorage.getItem('v29_records')) || [],
        stocks: JSON.parse(localStorage.getItem('v29_stocks')) || ['台積電', '0050', '00878', '00919'],
        freqs: JSON.parse(localStorage.getItem('v29_freqs')) || []
    };

    let state = {
        filterType: 'all',
        filterVal: null,
        chart: null
    };

    window.onload = () => {
        validateDB();
        refreshUI();
    };

    function validateDB() {
        db.records.forEach(r => {
            if (!r.total) r.total = Math.round(r.per * r.shares);
            if (!r.year) r.year = r.date.split('-')[0];
            if (!r.mAvg) r.mAvg = Math.round(r.total / (r.freq || 12));
        });
        saveDB();
    }

    function saveDB() {
        localStorage.setItem('v29_records', JSON.stringify(db.records));
        localStorage.setItem('v29_stocks', JSON.stringify(db.stocks));
        localStorage.setItem('v29_freqs', JSON.stringify(db.freqs));
    }

    function refreshUI() {
        renderNav();
        renderStockSelect();
        renderFreqSelect();
        renderMainContent();
    }

    function renderMainContent() {
        const list = document.getElementById('mainList');
        const totalDisplay = document.getElementById('totalDisplay');
        const avgDisplay = document.getElementById('avgDisplay');
        const sumLabel = document.getElementById('sumLabel');
        const chartCard = document.getElementById('chartCard');
        
        list.innerHTML = '';
        let displayData = [...db.records];

        if (state.filterType === 'stock') {
            displayData = displayData.filter(r => r.name === state.filterVal);
            sumLabel.innerText = `${state.filterVal} 歷年累計`;
            chartCard.classList.add('hide');
            avgDisplay.classList.add('hide');
        } else if (state.filterType === 'year') {
            displayData = displayData.filter(r => r.year === state.filterVal);
            sumLabel.innerText = `${state.filterVal} 年度總領`;
            chartCard.classList.remove('hide');
        } else {
            sumLabel.innerText = "總累計股息";
            chartCard.classList.add('hide');
            avgDisplay.classList.add('hide');
        }

        if (displayData.length === 0) {
            list.innerHTML = `<div class="empty-state">目前沒有相關紀錄</div>`;
            totalDisplay.innerText = "$ 0";
            return;
        }

        if (state.filterType === 'year') {
            const stockStats = {};
            displayData.forEach(r => {
                stockStats[r.name] = (stockStats[r.name] || 0) + r.total;
            });

            const ranked = Object.keys(stockStats).map(name => ({
                name,
                yearTotal: stockStats[name],
                yearMonthly: Math.round(stockStats[name] / 12)
            })).sort((a, b) => b.yearMonthly - a.yearMonthly);

            const yearSum = ranked.reduce((a, b) => a + b.yearTotal, 0);
            totalDisplay.innerText = "$ " + yearSum.toLocaleString();
            avgDisplay.classList.remove('hide');
            avgDisplay.innerText = `📈 該年平均每月加薪：$ ${Math.round(yearSum/12).toLocaleString()}`;
            
            ranked.forEach((item, index) => {
                list.innerHTML += `
                    <div class="item">
                        <div class="item-content" onclick="filterBy('stock', '${item.name}')">
                            <div class="item-title"><span class="rank-badge">TOP ${index+1}</span>${item.name}</div>
                            <div class="item-sub">${state.filterVal} 年度加總</div>
                        </div>
                        <div class="item-price-group">
                            <div class="item-price">$${item.yearTotal.toLocaleString()}</div>
                            <div class="item-monthly">年度月均: $${item.yearMonthly.toLocaleString()}</div>
                        </div>
                    </div>`;
            });
            initChart(ranked);

        } else {
            displayData.sort((a, b) => new Date(b.date) - new Date(a.date));
            const totalSum = displayData.reduce((a, b) => a + b.total, 0);
            totalDisplay.innerText = "$ " + totalSum.toLocaleString();

            displayData.forEach(r => {
                list.innerHTML += `
                    <div class="item">
                        <div class="item-content" onclick="editRecord(${r.id})">
                            <div class="item-title">${r.name}</div>
                            <div class="item-sub">${r.date} · ${getFreqText(r.freq)}</div>
                        </div>
                        <div class="item-price-group">
                            <div class="item-price">$${r.total.toLocaleString()}</div>
                            <div class="item-monthly">單筆月均: $${r.mAvg.toLocaleString()}</div>
                        </div>
                        <button class="action-btn" onclick="deleteRecord(${r.id})">✕</button>
                    </div>`;
            });
        }
    }

    function saveRecord() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('stockSelect').value;
        const freq = parseInt(document.getElementById('freqSelect').value);
        const date = document.getElementById('inputDate').value;
        const per = parseFloat(document.getElementById('inputPer').value);
        const shares = parseInt(document.getElementById('inputShares').value);

        if (!name || !date || isNaN(per) || isNaN(shares)) return alert("資料不完整");

        const total = Math.round(per * shares);
        const mAvg = Math.round(total / freq);
        const year = date.split('-')[0];

        if (id) {
            const idx = db.records.findIndex(r => r.id == id);
            db.records[idx] = { id: parseInt(id), name, freq, date, per, shares, total, mAvg, year };
            cancelEdit();
        } else {
            db.records.push({ id: Date.now(), name, freq, date, per, shares, total, mAvg, year });
        }

        saveDB();
        refreshUI();
        alert("資料已存檔");
    }

    function editRecord(id) {
        const r = db.records.find(i => i.id === id);
        if (!r) return;
        document.getElementById('editId').value = r.id;
        document.getElementById('stockSelect').value = r.name;
        document.getElementById('freqSelect').value = r.freq;
        document.getElementById('inputDate').value = r.date;
        document.getElementById('inputPer').value = r.per;
        document.getElementById('inputShares').value = r.shares;
        document.getElementById('inputCard').classList.add('editing');
        document.getElementById('editModeLabel').classList.remove('hide');
        document.getElementById('cancelBtn').classList.remove('hide');
        document.getElementById('submitBtn').innerText = "確認修改資料";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
        document.getElementById('editId').value = "";
        document.getElementById('inputPer').value = "";
        document.getElementById('inputShares').value = "";
        document.getElementById('inputCard').classList.remove('editing');
        document.getElementById('editModeLabel').classList.add('hide');
        document.getElementById('cancelBtn').classList.add('hide');
        document.getElementById('submitBtn').innerText = "存入股息紀錄";
    }

    function deleteRecord(id) {
        if (confirm("確定刪除這筆紀錄嗎？")) {
            db.records = db.records.filter(r => r.id !== id);
            saveDB();
            refreshUI();
        }
    }

    function renderStockSelect() {
        const s = document.getElementById('stockSelect');
        const currentVal = s.value;
        while(s.options.length > 2) s.remove(2);
        db.stocks.sort().forEach(n => s.add(new Option(n, n)));
        if (db.stocks.includes(currentVal)) s.value = currentVal;
    }

    function renderFreqSelect() {
        const s = document.getElementById('freqSelect');
        while(s.options.length > 5) s.remove(5);
        db.freqs.forEach(m => s.add(new Option(`${m}個月配`, m)));
    }

    function checkNewStock(sel) {
        if (sel.value === 'NEW_STOCK') {
            const n = prompt("請輸入新股票標的：");
            if (n && n.trim()) {
                if (!db.stocks.includes(n)) {
                    db.stocks.push(n.trim());
                    saveDB();
                    renderStockSelect();
                }
                sel.value = n.trim();
            } else sel.value = "";
        }
    }

    function checkNewFreq(sel) {
        if (sel.value === 'NEW_FREQ') {
            const m = prompt("請輸入配息頻率(月)：");
            if (m && !isNaN(m)) {
                if (!db.freqs.includes(m)) {
                    db.freqs.push(m);
                    saveDB();
                    renderFreqSelect();
                }
                sel.value = m;
            } else sel.value = "12";
        }
    }

    function renderNav() {
        const key = document.getElementById('navSearch').value.toLowerCase();
        const sList = document.getElementById('stock-list');
        const yList = document.getElementById('year-list');
        sList.innerHTML = ''; yList.innerHTML = '';
        const stocks = [...new Set(db.records.map(r => r.name))].sort();
        const years = [...new Set(db.records.map(r => r.year))].sort((a,b) => b-a);

        stocks.filter(s => s.toLowerCase().includes(key)).forEach(s => {
            const div = document.createElement('div');
            div.className = `nav-item ${state.filterType==='stock'&&state.filterVal===s?'active':''}`;
            div.innerText = s;
            div.onclick = () => filterBy('stock', s);
            sList.appendChild(div);
        });

        years.filter(y => y.includes(key)).forEach(y => {
            const div = document.createElement('div');
            div.className = `nav-item ${state.filterType==='year'&&state.filterVal===y?'active':''}`;
            div.innerText = `${y} 年度統計`;
            div.onclick = () => filterBy('year', y);
            yList.appendChild(div);
        });
    }

    function initChart(data) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (state.chart) state.chart.destroy();
        const labels = data.map(d => d.name);
        const values = data.map(d => d.yearTotal);
        const total = values.reduce((a,b) => a+b, 0);
        state.chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#27ae60', '#0984e3', '#f1c40f', '#e74c3c', '#9b59b6', '#1abc9c', '#34495e'],
                    borderWidth: 0
                }]
            },
            options: {
                cutout: '65%',
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        color: '#fff', backgroundColor: 'rgba(0,0,0,0.6)', borderRadius: 6, padding: 6, font: { size: 10, weight: 'bold' },
                        formatter: (v, c) => `${labels[c.dataIndex]}\n${((v/total)*100).toFixed(1)}%`
                    }
                }
            }
        });
    }

    function filterBy(type, val = null) {
        state.filterType = type;
        state.filterVal = val;
        document.getElementById('currentViewTitle').innerText = val || "所有紀錄";
        document.getElementById('nav-all').classList.toggle('active', type === 'all');
        refreshUI();
        if (window.innerWidth < 1000) toggleMenu();
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        const ov = document.getElementById('overlay');
        ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
    }

    function toggleNavGroup(id) {
        document.getElementById(id).classList.toggle('hide');
    }

    function getFreqText(m) {
        if (m == 12) return "年配";
        if (m == 6) return "半年配";
        if (m == 3) return "季配";
        if (m == 1) return "月配";
        return `${m}個月配`;
    }

    function forceReset() {
        if (confirm("這將會清除所有資料！確定要清空嗎？")) {
            localStorage.clear();
            location.reload();
        }
    }

    function exportCSV() {
        if (db.records.length === 0) return alert("無資料可匯出");
        let csv = "\uFEFF領取日期,標的名稱,配息頻率,每股股息,持有股數,總計股息\n";
        db.records.sort((a,b) => new Date(a.date)-new Date(b.date)).forEach(r => {
            csv += `${r.date},${r.name},${r.freq},${r.per},${r.shares},${r.total}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `股息戰力備份_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }

    function importCSV(input) {
        if (!input.files.length) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const lines = e.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
                const newRecords = [];
                for(let i = 1; i < lines.length; i++) {
                    const c = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
                    if (c.length >= 5) {
                        const date = c[0].replace(/\//g, '-');
                        const per = parseFloat(c[3]);
                        const shares = parseInt(c[4]);
                        const freq = parseInt(c[2] || 12);
                        const total = Math.round(per * shares);
                        newRecords.push({
                            id: Date.now() + i,
                            date, name: c[1], freq, per, shares, total,
                            mAvg: Math.round(total / freq),
                            year: date.split('-')[0]
                        });
                        if (!db.stocks.includes(c[1])) db.stocks.push(c[1]);
                    }
                }
                db.records = newRecords;
                saveDB(); refreshUI();
                alert(`成功匯入 ${newRecords.length} 筆紀錄！`);
            } catch(err) { alert("匯入失敗"); }
        };
        reader.readAsText(input.files[0]);
    }
</script>
