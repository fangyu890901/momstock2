<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡股息筆記 v26</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --bg: #fdfdfd; --text: #2d3436; --accent: #27ae60;
            --gray: #f1f2f6; --sidebar-w: 290px; --danger: #d63031; --monthly: #0984e3; --edit-bg: #fffcf0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        /* 側邊欄 */
        #sidebar { position: fixed; left: calc(-1 * var(--sidebar-w)); top: 0; width: var(--sidebar-w); height: 100%; background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1); transition: 0.3s; z-index: 1000; overflow-y: auto; padding: 25px; }
        #sidebar.open { left: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 999; backdrop-filter: blur(2px); }
        
        .search-box { width: 100%; border: 1.5px solid var(--gray); padding: 12px 15px; border-radius: 12px; font-size: 1rem; outline: none; margin-bottom: 20px; background: #fafafa; }
        .nav-group { margin-bottom: 15px; border-bottom: 1px solid var(--gray); padding-bottom: 10px; }
        .nav-title { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #999; font-weight: 800; padding: 10px 0; text-transform: uppercase; cursor: pointer; }
        .nav-list { overflow: hidden; transition: max-height 0.4s; }
        .nav-list.hidden { max-height: 0; }
        .nav-item { padding: 12px 15px; border-radius: 12px; cursor: pointer; font-size: 1rem; margin-bottom: 5px; }
        .nav-item.active { background: var(--text); color: white; font-weight: 600; }

        /* 主介面 */
        header { display: flex; align-items: center; padding: 15px 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--gray); position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 1.6rem; cursor: pointer; }
        .view-title { font-weight: 800; flex: 1; text-align: center; font-size: 1.1rem; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .summary-box { background: var(--text); color: white; padding: 30px 20px; border-radius: 28px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .total-val { font-size: 2.6rem; font-weight: 900; margin: 8px 0; letter-spacing: -1px; }
        
        .chart-card { background: white; padding: 20px; border-radius: 24px; border: 1.5px solid var(--gray); margin-bottom: 25px; display: none; box-shadow: var(--shadow); }

        .card { background: white; padding: 25px; border-radius: 24px; border: 1.5px solid var(--gray); margin-bottom: 25px; }
        .card.editing { border-color: #f1c40f; background-color: var(--edit-bg); }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; color: #7f8c8d; margin-bottom: 6px; font-weight: 700; }
        input, select { width: 100%; border: 1.5px solid var(--gray); padding: 14px; border-radius: 14px; font-size: 1rem; background: white; }
        
        .btn-add { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }

        /* 清單樣式 */
        .item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--gray); }
        .item-clickable { flex: 1; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .item-info b { font-size: 1.1rem; }
        .item-price { color: var(--accent); font-weight: 800; font-size: 1.2rem; }
        .item-avg { color: var(--monthly); font-size: 0.85rem; font-weight: 700; margin-top: 4px; }
        .action-btn { border: none; background: #fff0f0; padding: 12px; border-radius: 12px; color: var(--danger); margin-left: 10px; }
        
        .rank-badge { background: #eee; color: #777; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; margin-right: 8px; vertical-align: middle; }
        .hide { display: none; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>
    <div id="sidebar">
        <input type="text" id="navSearch" class="search-box" placeholder="搜尋股票、年份..." oninput="renderNav()">
        <div class="nav-item active" id="nav-all" style="margin-bottom:20px" onclick="filterBy('all')">📍 所有紀錄</div>
        <div class="nav-group">
            <div class="nav-title" onclick="document.getElementById('stock-nav-list').classList.toggle('hidden')">股票分類 ▾</div>
            <div id="stock-nav-list" class="nav-list"></div>
        </div>
        <div class="nav-group">
            <div class="nav-title" onclick="document.getElementById('year-nav-list').classList.toggle('hidden')">年份分類 ▾</div>
            <div id="year-nav-list" class="nav-list"></div>
        </div>
        <div style="margin-top:30px">
            <button style="width:100%; padding:14px; border-radius:12px; border:1px solid #ddd; background:#fff; margin-bottom:10px" onclick="exportCSV()">💾 匯出備份</button>
            <button style="width:100%; padding:14px; border-radius:12px; border:1px solid #ddd; background:#fff" onclick="document.getElementById('importFile').click()">📤 匯入備份</button>
            <input type="file" id="importFile" class="hide" accept=".csv" onchange="importCSV(this)">
        </div>
    </div>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="view-title" id="currentViewTitle">所有紀錄</div>
        <div style="width:32px"></div>
    </header>

    <div class="container">
        <div class="summary-box">
            <div id="summary-label" style="font-size:0.9rem; opacity:0.85; font-weight:600">總累計股息</div>
            <div class="total-val" id="totalDisplay">$ 0</div>
            <div id="avgDisplay" class="hide" style="font-size:1rem; margin-top:12px; border-top:1px solid rgba(255,255,255,0.2); padding-top:12px; font-weight:600"></div>
        </div>

        <div class="chart-card" id="chartCard"><canvas id="myChart"></canvas></div>

        <div class="card" id="inputCard">
            <div id="editLabel" style="display:none; color:#f39c12; font-size:0.9rem; font-weight:900; margin-bottom:15px; text-align:center">⚠️ 正在編輯單筆紀錄</div>
            <div class="input-group">
                <label>股票名稱</label>
                <select id="stockSelect" onchange="handleStockSelect(this)">
                    <option value="">選擇股票標的...</option>
                    <option value="NEW_STOCK" style="color:var(--monthly)">+ 新增自定義股票</option>
                </select>
            </div>
            <div class="input-group">
                <label>配息頻率</label>
                <select id="freqSelect" onchange="handleFreqSelect(this)">
                    <option value="12">年配</option>
                    <option value="6">半年配</option>
                    <option value="3">季配</option>
                    <option value="1">月配</option>
                    <option value="NEW_FREQ" style="color:var(--monthly)">+ 新增自定義月份</option>
                </select>
            </div>
            <div class="input-group"><label>領取日期</label><input type="date" id="divDate"></div>
            <div style="display:flex; gap:15px">
                <div class="input-group" style="flex:1"><label>每股股息</label><input type="number" id="perShare" step="0.001" inputmode="decimal"></div>
                <div class="input-group" style="flex:1"><label>持有股數</label><input type="number" id="shareCount" inputmode="numeric"></div>
            </div>
            <input type="hidden" id="editingId" value="">
            <button class="btn-add" id="mainBtn" onclick="handleSubmit()">存入股息紀錄</button>
            <button id="cancelEditBtn" class="hide" style="width:100%; background:none; border:none; color:#95a5a6; margin-top:15px; font-weight:bold" onclick="exitEditMode()">放棄修改</button>
        </div>

        <div id="recordList"></div>
    </div>

<script>
    Chart.register(ChartDataLabels);
    let records = JSON.parse(localStorage.getItem('div_records')) || [];
    let stockNames = JSON.parse(localStorage.getItem('div_stocks')) || ['台積電', '0050', '00878'];
    let customFreqs = JSON.parse(localStorage.getItem('div_freqs')) || [];
    let currentFilter = { type: 'all', value: null };
    let myChart = null;

    window.onload = () => { updateStockSelect(); updateFreqSelect(); render(); };

    function getFreqName(months) {
        const m = parseInt(months);
        if(m === 12) return "年配";
        if(m === 6) return "半年配";
        if(m === 3) return "季配";
        if(m === 1) return "月配";
        return m + "月配";
    }

    function renderNav() {
        const key = document.getElementById('navSearch').value.toLowerCase();
        const sList = document.getElementById('stock-nav-list');
        const yList = document.getElementById('year-nav-list');
        sList.innerHTML = ''; yList.innerHTML = '';
        const stocks = [...new Set(records.map(r => r.name))].sort();
        const years = [...new Set(records.map(r => r.year))].sort((a,b) => b-a);
        stocks.filter(s => s.toLowerCase().includes(key)).forEach(s => sList.innerHTML += `<div class="nav-item ${currentFilter.type==='stock'&&currentFilter.value===s?'active':''}" onclick="filterBy('stock', '${s}')">${s}</div>`);
        years.filter(y => y.includes(key)).forEach(y => yList.innerHTML += `<div class="nav-item ${currentFilter.type==='year'&&currentFilter.value===y?'active':''}" onclick="filterBy('year', '${y}')">${y} 年份</div>`);
    }

    function render() {
        renderNav();
        const list = document.getElementById('recordList');
        const totalEl = document.getElementById('totalDisplay');
        const avgEl = document.getElementById('avgDisplay');
        const labelEl = document.getElementById('summary-label');
        list.innerHTML = '';
        
        let filtered = [...records];
        
        if(currentFilter.type === 'year') {
            // --- 年度戰力排名模式 ---
            const year = currentFilter.value;
            filtered = filtered.filter(r => r.year === year);
            labelEl.innerText = `${year} 年度總領`;
            
            // 彙整該年各股票總額
            const stockStats = {};
            filtered.forEach(r => {
                stockStats[r.name] = (stockStats[r.name] || 0) + r.total;
            });

            // 轉為陣列並按月平均(總額/12)由高到低排序
            const sortedStocks = Object.keys(stockStats).map(name => ({
                name,
                yearTotal: stockStats[name],
                yearMonthlyAvg: Math.round(stockStats[name] / 12)
            })).sort((a, b) => b.yearMonthlyAvg - a.yearMonthlyAvg);

            const totalYearSum = sortedStocks.reduce((a, b) => a + b.yearTotal, 0);
            totalEl.innerText = "$ " + totalYearSum.toLocaleString();
            avgEl.classList.remove('hide');
            avgEl.innerText = `📈 該年平均每月加薪：$ ${Math.round(totalYearSum/12).toLocaleString()}`;

            sortedStocks.forEach((s, index) => {
                list.innerHTML += `
                    <div class="item">
                        <div class="item-clickable" onclick="filterBy('stock', '${s.name}')">
                            <div class="item-info">
                                <span class="rank-badge">TOP ${index+1}</span>
                                <b>${s.name}</b><br>
                                <small style="color:#95a5a6">${year} 年度總領</small>
                            </div>
                            <div style="text-align:right">
                                <div class="item-price">$${s.yearTotal.toLocaleString()}</div>
                                <div class="item-avg">年度月均: $${s.yearMonthlyAvg.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>`;
            });
            updateChart(filtered);

        } else {
            // --- 一般明細模式 (所有紀錄 / 特定股票) ---
            if(currentFilter.type === 'stock') {
                filtered = filtered.filter(r => r.name === currentFilter.value);
                labelEl.innerText = `${currentFilter.value} 歷年累計`;
            } else {
                labelEl.innerText = "總累計股息";
            }
            
            filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
            let sum = filtered.reduce((a, b) => a + b.total, 0);
            totalEl.innerText = "$ " + sum.toLocaleString();
            avgEl.classList.add('hide');
            document.getElementById('chartCard').style.display='none';

            filtered.forEach(r => {
                list.innerHTML += `
                    <div class="item">
                        <div class="item-clickable" onclick="startEdit(${r.id})">
                            <div class="item-info">
                                <b>${r.name}</b><br>
                                <small style="color:#95a5a6">${r.date} · ${getFreqName(r.freq)}</small>
                            </div>
                            <div style="text-align:right">
                                <div class="item-price">$${r.total.toLocaleString()}</div>
                                <div class="item-avg">單筆月均: $${r.monthlyAvg.toLocaleString()}</div>
                            </div>
                        </div>
                        <button class="action-btn" onclick="deleteRecord(${r.id})">✕</button>
                    </div>`;
            });
        }
    }

    function updateChart(data) {
        document.getElementById('chartCard').style.display = 'block';
        const ctx = document.getElementById('myChart').getContext('2d');
        if(myChart) myChart.destroy();
        const map = {};
        data.forEach(r => map[r.name] = (map[r.name] || 0) + r.total);
        const labels = Object.keys(map);
        const values = Object.values(map);
        const total = values.reduce((a,b)=>a+b, 0);

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: labels, datasets: [{ data: values, backgroundColor: ['#27ae60','#0984e3','#f1c40f','#e74c3c','#9b59b6','#34495e','#1abc9c'] }] },
            options: { cutout: '60%', plugins: { legend: { display: false }, datalabels: {
                color: '#fff', backgroundColor: 'rgba(45, 52, 70, 0.85)', borderRadius: 6, padding: 8, textAlign: 'center', font: { size: 11, weight: 'bold' },
                formatter: (v, c) => `${c.chart.data.labels[c.dataIndex]}\n${((v/total)*100).toFixed(1)}%\n(月均$${Math.round(v/12).toLocaleString()})`
            } } }
        });
    }

    function handleSubmit() {
        const id = document.getElementById('editingId').value;
        const name = document.getElementById('stockSelect').value;
        const freq = parseInt(document.getElementById('freqSelect').value);
        const date = document.getElementById('divDate').value;
        const per = parseFloat(document.getElementById('perShare').value);
        const shares = parseInt(document.getElementById('shareCount').value);
        if(!name || !date || isNaN(per) || isNaN(shares)) return alert("欄位不完整！");
        const total = Math.round(per * shares);
        const monthlyAvg = Math.round(total / freq);
        const year = date.split('-')[0];
        if(id) {
            const idx = records.findIndex(r => r.id == id);
            records[idx] = { ...records[idx], name, date, per, shares, freq, total, monthlyAvg, year };
            exitEditMode();
        } else { records.push({ id: Date.now(), name, date, per, shares, freq, year, total, monthlyAvg }); }
        localStorage.setItem('div_records', JSON.stringify(records)); render();
    }

    function startEdit(id) {
        const r = records.find(item => item.id === id);
        if(!r) return;
        document.getElementById('stockSelect').value = r.name;
        document.getElementById('freqSelect').value = r.freq;
        document.getElementById('divDate').value = r.date;
        document.getElementById('perShare').value = r.per;
        document.getElementById('shareCount').value = r.shares;
        document.getElementById('editingId').value = r.id;
        document.getElementById('inputCard').classList.add('editing');
        document.getElementById('editLabel').style.display = 'block';
        document.getElementById('mainBtn').innerText = "確認修改";
        document.getElementById('cancelEditBtn').classList.remove('hide');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function exitEditMode() {
        document.getElementById('editingId').value = "";
        document.getElementById('inputCard').classList.remove('editing');
        document.getElementById('editLabel').style.display = 'none';
        document.getElementById('mainBtn').innerText = "存入股息紀錄";
        document.getElementById('cancelEditBtn').classList.add('hide');
    }

    function handleStockSelect(sel) {
        if(sel.value === 'NEW_STOCK') {
            const n = prompt("新股票名稱：");
            if(n && n.trim()) {
                if(!stockNames.includes(n)) stockNames.push(n);
                localStorage.setItem('div_stocks', JSON.stringify(stockNames));
                updateStockSelect(); sel.value = n;
            } else sel.value = "";
        }
    }

    function handleFreqSelect(sel) {
        if(sel.value === 'NEW_FREQ') {
            const m = prompt("自定義月份：");
            if(m && !isNaN(m)) {
                if(!customFreqs.includes(m)) customFreqs.push(m);
                localStorage.setItem('div_freqs', JSON.stringify(customFreqs));
                updateFreqSelect(); sel.value = m;
            } else sel.value = "12";
        }
    }

    function updateStockSelect() {
        const s = document.getElementById('stockSelect');
        while(s.options.length > 2) s.remove(2);
        stockNames.sort().forEach(n => s.add(new Option(n, n)));
    }

    function updateFreqSelect() {
        const s = document.getElementById('freqSelect');
        while(s.options.length > 5) s.remove(5);
        customFreqs.forEach(m => { if(![1, 3, 6, 12].includes(parseInt(m))) s.add(new Option(getFreqName(m), m)); });
    }

    function filterBy(type, val = null) {
        currentFilter = { type, value: val };
        document.getElementById('currentViewTitle').innerText = val || "所有紀錄";
        render(); if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        const ov = document.getElementById('overlay');
        ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
    }

    function deleteRecord(id) {
        if(confirm("刪除這筆單筆紀錄？")) { records = records.filter(r => r.id !== id); localStorage.setItem('div_records', JSON.stringify(records)); render(); }
    }

    function exportCSV() {
        let csv = "\uFEFF日期,股票名稱,頻率,每股股息,持有股數,總計,月均\n";
        records.forEach(r => csv += `"${r.date}","${r.name}","${r.freq}","${r.per}","${r.shares}","${r.total}","${r.monthlyAvg}"\n`);
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `股息_${new Date().toISOString().slice(0,10)}.csv`; a.click();
    }

    function importCSV(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
            const newRecs = [];
            for(let i=1; i<lines.length; i++) {
                const c = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v => v.replace(/^"|"$/g, '').trim());
                if(c.length >= 5) {
                    const date = c[0].replace(/\//g, '-');
                    const total = Math.round(parseFloat(c[3]) * parseInt(c[4]));
                    newRecs.push({ id: Date.now()+i, date, name: c[1], freq: parseInt(c[2]||12), per: parseFloat(c[3]), shares: parseInt(c[4]), year: date.split('-')[0], total, monthlyAvg: Math.round(total/parseInt(c[2]||12)) });
                }
            }
            records = newRecs; localStorage.setItem('div_records', JSON.stringify(records)); render();
        };
        reader.readAsText(input.files[0]);
    }
</script>
</body>
</html>
